{% extends "base.html" %}
{% block title %}Отчёты — Сборная команда{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Выгрузить полный список</h1>

<form method="post" action="{{ url_for('reports.reports_preview') }}">
    <div class="row g-3">
        <div class="col-md-4">
            <label class="form-label">Дата документа</label>
            <input type="date" name="doc_date" class="form-control" value="{{ today }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">Возрастная категория</label>
            <select name="age_category" class="form-select">
                <option value="">Все</option>
                {% for a in references.AGE_CATEGORIES %}
                <option value="{{ a }}">{{ a }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Территория</label>
            <select name="territory" class="form-select">
                <option value="">Все</option>
                {% for t in references.TERRITORIES %}
                <option value="{{ t }}">{{ t }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Пол</label>
            <select name="gender" class="form-select">
                <option value="">Все</option>
                {% for g in references.GENDERS %}
                <option value="{{ g }}">{{ g }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-4">
            <div class="form-check mt-4">
                <input type="checkbox" name="only_national_team" class="form-check-input" id="onlyNationalTeam">
                <label class="form-check-label" for="onlyNationalTeam">Только включённые в сборную РФ</label>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary">Предпросмотр</button>
    </div>
</form>

<hr class="my-5">

<h2 class="h3 mb-4">Выгрузить изменения в список (исключить / включить)</h2>
<form method="post" action="{{ url_for('reports.reports_changes_preview') }}" class="row g-3 align-items-end" style="max-width: 600px;">
    <div class="col-md-6">
        <label class="form-label">Дата документа</label>
        <input type="date" name="doc_date" class="form-control" value="{{ today }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Номер документа</label>
        <input type="text" name="document_number" class="form-control" placeholder="например, 1">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Предпросмотр</button>
    </div>
</form>
{% endblock %}
