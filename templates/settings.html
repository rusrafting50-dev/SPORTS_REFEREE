{% extends "base.html" %}
{% block title %}Настройки — Сборная команда{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Настройки</h1>

<form method="post" action="{{ url_for('settings') }}" class="row g-3" style="max-width: 700px;">
    <div class="col-12">
        <label class="form-label">Наименование организации</label>
        <input type="text" name="organization_name" class="form-control" value="{{ settings.organization_name if settings else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Должность руководителя организации</label>
        <input type="text" name="chairman_position" class="form-control" value="{{ settings.chairman_position if settings else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Фамилия инициалы руководителя организации</label>
        <input type="text" name="chairman_name" class="form-control" value="{{ settings.chairman_name if settings else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Фамилия инициалы Главный тренер</label>
        <input type="text" name="head_coach_name" class="form-control" value="{{ settings.head_coach_name if settings else '' }}">
    </div>
    <div class="col-md-8">
        <label class="form-label">Наименование вида спорта</label>
        <input type="text" name="sport_name" class="form-control" value="{{ settings.sport_name if settings else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Год</label>
        <input type="number" name="year" class="form-control" value="{{ settings.year if settings else '' }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Сохранить</button>
    </div>
</form>
{% endblock %}
