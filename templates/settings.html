{% extends "base.html" %}
{% block title %}Настройки — Спортивные судьи{% endblock %}
{% block content %}
<h1 class="h3 mb-4">Настройки</h1>

<form method="post" action="{{ url_for('settings') }}" class="row g-3" style="max-width: 900px;">
    <div class="col-md-6">
        <label class="form-label">Наименование вида спорта</label>
        <input type="text" name="sport_name" class="form-control" value="{{ settings.sport_name if settings else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Номер-код вида спорта</label>
        <input type="text" name="sport_code" class="form-control" value="{{ settings.sport_code if settings else '' }}">
    </div>
    <div class="col-12">
        <label class="form-label">Наименование организации, осуществляющей учёт судейской деятельности</label>
        <input type="text" name="organization_name" class="form-control" value="{{ settings.organization_name if settings else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Адрес (место нахождения) организации</label>
        <input type="text" name="organization_address" class="form-control" value="{{ settings.organization_address if settings else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Телефон, адрес электронной почты организации</label>
        <input type="text" name="organization_contacts" class="form-control" value="{{ settings.organization_contacts if settings else '' }}">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-primary">Сохранить</button>
    </div>
</form>
{% endblock %}
